<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body{
margin:0;
font-family: 'Courier New', monospace;
background:#ffffff;
color:#000;
overflow:hidden;
}
#app{
height:100vh;
width:100vw;
display:flex;
align-items:center;
justify-content:center;
}
.box{
width:90%;
max-width:500px;
background:#f5f5f5;
border:2px solid #999;
padding:20px;
box-sizing:border-box;
overflow-y:auto;
max-height:90vh;
}
input, button{
font-family: 'Courier New', monospace;
}
input{
width:100%;
padding:10px;
border:1px solid #999;
}
button{
margin:5px;
padding:10px;
border:1px solid #999;
background:#eaeaea;
}
.crash{
background:#000;
color:#fff;
height:100vh;
width:100vw;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-family: 'Courier New', monospace;
}
.hidden{display:none;}
.section{
margin-top:10px;
}
.card{
border:1px solid #aaa;
padding:10px;
margin-top:10px;
cursor:pointer;
background:#fff;
}
textarea{
width:100%;
height:80px;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
let app=document.getElementById('app');

let step=0;
let noStage=0;

function renderName(){
app.innerHTML=`
<div class="box">
Hi, and who are you?
<input id="nameInput" />
<button onclick="checkName()"></button>
</div>
`;
}

function crash(){
app.innerHTML=`<div class='crash'>This is not for you!</div>`;
}

function checkName(){
let val=document.getElementById('nameInput').value;
if(val.trim()==='Purp'){
mainPage();
}else{
crash();
}
}

function mainPage(){
app.innerHTML=`
<div class="box">
<div class="section">
<button onclick="yesFlow()">YES</button>
<button onclick="noFlow()">NO</button>
</div>
</div>
`;
}

function noFlow(){
let texts=["Really?","Are you sure?","Iz dat your final answer?","Ihh, ayaw! Sure na ba?","YES"];
if(noStage<texts.length){
app.innerHTML=`<div class='box'><button onclick='noFlow()'>${texts[noStage++]}</button></div>`;
}else{
yesFlow();
}
}

function yesFlow(){
app.innerHTML=`
<div class="box">
<div class="card" onclick="openCard1()">Why do I like you</div>
<div class="card" onclick="openCard2()">I'm interested in the lore.</div>
</div>
`;
}

function openCard1(){
app.innerHTML=`
<div class="box">
About sa question mo… nahihirapan akong sagutin kasi ang daming reasons why I like you. And siguro 'yon din yung reason bakit ako natatakot minsan—kasi ang daming pwedeng magustuhan sa 'yo, and ang daming taong pwedeng magka-interest sa 'yo. What if may dumating na someone better? I mean, technically laging may mas better naman talaga, pero what if mas maging interesting sila for you? Natatakot lang ako na baka masaktan ulit the same way na nasaktan ako before.

Pero going back sa question mo—why do I like you?

Magsisinungaling ako if sasabihin kong hindi ako unang na-attract sa 'yo because of your beauty and brains. You really have both. Pero habang mas nakikilala kita, mas nare-realize ko na parang hindi mo alam kung gaano kadaling mahulog sa 'yo.

Siguro dahil sa humor mo, sa way mo makipag-usap sa tao, and sa pagiging witty mo. Yung tipong entertaining ka kausap pero may substance rin—especially kapag politics or random serious topics pinag-uusapan natin.
I like how ayaw mong may nale-left behind. Tapos yung voice mo… especially when you sing? Ugh, music to my ears talaga, eme HAHAHA.

I also like how hindi ka takot matuto at mag-improve. Hindi ka rin takot maging sarili mo, kahit "jejemon" minsan. Ang cute mo sa part na 'yon, honestly. Tapos ang cute mo rin kapag inaasar ka tapos bigla kang magtatampo or lalayo. Ang sarap mong asarin minsan.

And 'yong passion mo sa program mo? Sobrang attractive no'n for me. Also, na-appreciate ko rin na naalala mo favorite song ko. Maliit na bagay siya for other people pero I just think it's cute.
But honestly, hindi ko pa masasabi na sobrang down bad na ako… that scares me kasi. What if dumating ako sa point na 'yon? Will it ruin me again?
</div>
`;
}

function openCard2(){
app.innerHTML=`
<div class="box">
<div class="section">I'm interested in the lore.</div>

<div class="section">Fei shang, gao shing, chi, shishyang, Chonghu, Guaja, Jushi, Xijingpin, Chunguju, Frelupin, Tashir?</div>
<textarea></textarea>

<div class="section">I'm trying to unlock your lore a little. What's something about you people don't notice right away?</div>
<textarea></textarea>

<div class="section">I feel like there's more to you than the aesthetic. What kind of person are you when you're fully comfortable?</div>
<textarea></textarea>

<div class="section">You seem interesting beyond the surface level. What's something you could talk about for hours?</div>
<textarea></textarea>

<div class="section">
<button onclick="done()">done</button>
</div>
</div>
`;
}

function done(){
document.body.innerHTML=`<form action="https://formsubmit.co/Nothingnessnot1999@gmail.com" method="POST"><input type="hidden" name="_captcha" value="false"></form>`;
document.querySelector('form').submit();
}

renderName();
</script>
</body>
</html>
